org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Java home se detecta automáticamente desde JAVA_HOME o el sistema
# Si necesitas especificar una ruta, usa la variable de entorno JAVA_HOME
# o crea un archivo local.properties con:
#   org.gradle.java.home=/ruta/a/tu/jdk